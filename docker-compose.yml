version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: retrobuzz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: retrobuzz
      POSTGRES_PASSWORD: retrobuzz
      POSTGRES_DB: retrobuzz
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U retrobuzz']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: retrobuzz_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: retrobuzz_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://retrobuzz:retrobuzz@postgres:5432/retrobuzz?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      N8N_ENRICH_WEBHOOK_URL: ${N8N_ENRICH_WEBHOOK_URL:-}
      N8N_WEBHOOK_TOKEN: ${N8N_WEBHOOK_TOKEN:-}
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: retrobuzz_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
